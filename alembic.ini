# Alembic configuration

[alembic]
# Migration script location
script_location = alembic

# Migration file template
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Python path
prepend_sys_path = .

# Time zone
timezone = UTC

# Slug truncation
truncate_slug_length = 40

# Revision environment
revision_environment = false

# Output encoding
output_encoding = utf-8

# sqlalchemy.url is configured dynamically in env.py
# sqlalchemy.url = 

[post_write_hooks]
# Format generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
