# Alembic配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 迁移脚本模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path 路径
prepend_sys_path = .

# 时区
timezone = UTC

# 是否截断长的迁移文件名
truncate_slug_length = 40

# 迁移版本命名样式
revision_environment = false

# 输出编码
output_encoding = utf-8

# sqlalchemy.url在env.py中动态设置
# sqlalchemy.url = 

[post_write_hooks]
# 格式化生成的迁移文件
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
